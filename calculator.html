<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0f0f14;
    font-family: 'Outfit', sans-serif;
    background-image: radial-gradient(circle at 30% 30%, rgba(110,86,207,0.15) 0%, transparent 50%),
                      radial-gradient(circle at 70% 70%, rgba(86,207,166,0.08) 0%, transparent 50%);
  }
  .calc-wrapper {
    background: #17171f;
    border: 1px solid #2a2a38;
    border-radius: 24px;
    padding: 2rem;
    width: 340px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .calc-title {
    font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
    color: #555570; margin-bottom: 1.5rem; text-align: center;
  }
  .display {
    background: #0f0f14; border-radius: 14px;
    padding: 1.5rem; margin-bottom: 1.2rem;
    border: 1px solid #1e1e2e; min-height: 100px;
    display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end;
    overflow: hidden;
  }
  .expression {
    font-family: 'Space Mono', monospace; font-size: .8rem;
    color: #4a4a6a; margin-bottom: .3rem; word-break: break-all;
    min-height: 1.2em;
  }
  .result {
    font-family: 'Space Mono', monospace; font-size: 2.4rem; font-weight: 700;
    color: #e8e8f8; word-break: break-all; transition: all .1s;
  }
  .result.error { color: #f77b7b; font-size: 1.4rem; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; }
  button {
    padding: 1.1rem .5rem; border: none; border-radius: 12px;
    font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: transform .1s, opacity .15s;
    user-select: none;
  }
  button:active { transform: scale(.92); }
  .btn-num {
    background: #1e1e2e; color: #c8c8e8;
    border: 1px solid #2a2a3a;
  }
  .btn-num:hover { background: #252535; }
  .btn-op {
    background: rgba(110,86,207,0.18); color: #8b78e8;
    border: 1px solid rgba(110,86,207,0.3);
  }
  .btn-op:hover { background: rgba(110,86,207,0.28); }
  .btn-eq {
    background: linear-gradient(135deg, #6e56cf, #9b8ae8); color: #fff;
    border: none; grid-column: span 2;
  }
  .btn-eq:hover { opacity: .9; }
  .btn-clear {
    background: rgba(247,100,100,0.15); color: #f77b7b;
    border: 1px solid rgba(247,100,100,0.25);
  }
  .btn-clear:hover { background: rgba(247,100,100,0.25); }
  .btn-del {
    background: rgba(247,160,80,0.15); color: #f7a050;
    border: 1px solid rgba(247,160,80,0.25);
  }
  .btn-del:hover { background: rgba(247,160,80,0.25); }
  .btn-zero { grid-column: span 1; }
  .calc-footer { text-align: center; margin-top: 1.2rem; font-size: .7rem; color: #33334a; }
</style>
</head>
<body>
<div class="calc-wrapper">
  <p class="calc-title">Calculator</p>
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-del" onclick="deleteLast()">⌫</button>
    <button class="btn-op" onclick="appendOp('%')">%</button>
    <button class="btn-op" onclick="appendOp('/')">÷</button>

    <button class="btn-num" onclick="appendNum('7')">7</button>
    <button class="btn-num" onclick="appendNum('8')">8</button>
    <button class="btn-num" onclick="appendNum('9')">9</button>
    <button class="btn-op" onclick="appendOp('*')">×</button>

    <button class="btn-num" onclick="appendNum('4')">4</button>
    <button class="btn-num" onclick="appendNum('5')">5</button>
    <button class="btn-num" onclick="appendNum('6')">6</button>
    <button class="btn-op" onclick="appendOp('-')">−</button>

    <button class="btn-num" onclick="appendNum('1')">1</button>
    <button class="btn-num" onclick="appendNum('2')">2</button>
    <button class="btn-num" onclick="appendNum('3')">3</button>
    <button class="btn-op" onclick="appendOp('+')">+</button>

    <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
    <button class="btn-num" onclick="appendDot()">.</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
  <p class="calc-footer">Project 2 · edQuest Web Dev</p>
</div>

<script>
  let expression = '';
  let justCalculated = false;

  const exprEl = document.getElementById('expression');
  const resultEl = document.getElementById('result');

  function updateDisplay() {
    const display = expression
      .replace(/\*/g, '×')
      .replace(/\//g, '÷');
    exprEl.textContent = display;
  }

  function appendNum(num) {
    if (justCalculated) { expression = ''; justCalculated = false; }
    expression += num;
    resultEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷');
    resultEl.classList.remove('error');
    updateDisplay();
  }

  function appendOp(op) {
    justCalculated = false;
    const last = expression.slice(-1);
    if (['+', '-', '*', '/'].includes(last)) {
      expression = expression.slice(0, -1);
    }
    expression += op;
    updateDisplay();
    const preview = expression.replace(/\*/g,'×').replace(/\//g,'÷');
    resultEl.textContent = preview;
    resultEl.classList.remove('error');
  }

  function appendDot() {
    if (justCalculated) { expression = '0'; justCalculated = false; }
    const parts = expression.split(/[+\-*/]/);
    const last = parts[parts.length - 1];
    if (!last.includes('.')) {
      if (!last) expression += '0';
      expression += '.';
      updateDisplay();
      resultEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷');
    }
  }

  function deleteLast() {
    if (justCalculated) { clearAll(); return; }
    expression = expression.slice(0, -1);
    resultEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷') || '0';
    resultEl.classList.remove('error');
    updateDisplay();
  }

  function clearAll() {
    expression = '';
    exprEl.textContent = '';
    resultEl.textContent = '0';
    resultEl.classList.remove('error');
    justCalculated = false;
  }

  function calculate() {
    if (!expression) return;
    try {
      exprEl.textContent = expression.replace(/\*/g,'×').replace(/\//g,'÷') + ' =';
      const res = Function('"use strict"; return (' + expression + ')')();
      if (!isFinite(res)) throw new Error('Cannot divide by zero');
      const rounded = parseFloat(res.toFixed(10));
      resultEl.textContent = rounded;
      resultEl.classList.remove('error');
      expression = String(rounded);
      justCalculated = true;
    } catch (e) {
      resultEl.textContent = 'Error';
      resultEl.classList.add('error');
      expression = '';
      justCalculated = false;
    }
  }

  
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '+') appendOp('+');
    else if (e.key === '-') appendOp('-');
    else if (e.key === '*') appendOp('*');
    else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
    else if (e.key === '%') appendOp('%');
    else if (e.key === '.') appendDot();
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') deleteLast();
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
